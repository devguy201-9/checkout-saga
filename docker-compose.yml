## docker-compose.yml — local dev stack
##
## Current: PostgreSQL + Redis + Adminer.
## Planned: Kafka; then Prometheus + Grafana + Jaeger.

services:
  postgres:
    image: postgres:16-alpine
    container_name: checkout-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-checkout}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-checkout_dev_pwd}
      POSTGRES_DB: checkout
      # Service-specific DB names passed down to init script.
      ORDER_DB_NAME: ${ORDER_DB_NAME:-order_db}
      INVENTORY_DB_NAME: ${INVENTORY_DB_NAME:-inventory_db}
      PAYMENT_DB_NAME: ${PAYMENT_DB_NAME:-payment_db}
      SAGA_DB_NAME: ${SAGA_DB_NAME:-saga_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deployments/postgres/init-databases.sh:/docker-entrypoint-initdb.d/01-init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-checkout} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - checkout-net

  redis:
    image: redis:7-alpine
    container_name: checkout-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - "256mb"
      - --maxmemory-policy
      - "allkeys-lru"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - checkout-net

  adminer:
    image: adminer:4-standalone
    container_name: checkout-adminer
    restart: unless-stopped
    ports:
      - "8090:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: dracula
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - checkout-net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  checkout-net:
    driver: bridge
    name: checkout-net
